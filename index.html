<!DOCTYPE html>
<html>
  <head>
    <title>Test</title>
    <style>
      canvas {
        border: solid;
      }
    </style>
  </head>
  <body>
    <canvas></canvas>
    <script>
      const canvas = document.querySelector("canvas");
      canvas.height = 2 ** 9;
      canvas.width = 2 ** 10;
      const ctx = canvas.getContext("2d");
      
      // renderer
      const maxTileX = 2 ** 4; 
      const maxTileY = 2 ** 3;  
      const TileSideX = canvas.width / maxTileX;
      const TileSideY = canvas.height / maxTileY;
      
      // graph
      const nodesLayout = new Array(maxTileY).fill(0).map(it => new Array(maxTileX).fill(0));

      nodesLayout[0][0] = "A";
      nodesLayout[0][1] = "B";
      nodesLayout[1][3] = "C";
      nodesLayout[2][3] = "D";

      const edges = {
        A: ["B"],
        C: ["D"]
      };

      let x = 0, y = 0;
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const buffer = new Uint32Array(imageData.data.buffer);

      renderLoop();

      canvas.addEventListener("mousemove", ev => {
        x = ev.offsetX;
        y = ev.offsetY;
      });

      function renderLoop() {
        requestAnimationFrame(() => {
          DrawFrame(edges, nodesLayout);
          renderLoop();
        })
      }

      function DrawFrame(edges, nodesLayout) {
        // const t0 = performance.now();
        for (let i = 0; i < buffer.length; i++) {
          buffer[i] = 0xffffffff;
        }
        DrawNodes(edges, nodesLayout);
        DrawHoveredTile(x, y);
        ctx.putImageData(imageData, 0, 0);
        // const t1 = performance.now();
        // const timeForFrame = Math.floor(t1 - t0);
        // console.log(`Time for frame: ${timeForFrame}ms, Frames Per Second: ${Math.floor(1000/timeForFrame)}`);
      }

      function DrawHoveredTile(x, y) {
        const TileX = Math.floor(x / TileSideX);
        const TileY = Math.floor(y / TileSideY);
        DrawTile(buffer, TileX, TileY, 0xffcccccc);
      }

      function DrawNodes(edges, nodesLayout) {
        for (let Row = 0; Row < maxTileY; Row++) {
          for (let Col = 0; Col < maxTileX; Col++) {
            let node = nodesLayout[Row][Col];
            if (node !== 0) {
              DrawTile(buffer, Col, Row, 0xffcccccc);
            }
          }
        }

        for (let Row = 0; Row < maxTileY; Row++) {
          for (let Col = 0; Col < maxTileX; Col++) {
            let node = nodesLayout[Row][Col];
            if (edges[node]) {
              for (let OtherEnd of edges[node]) {
                let RowEnd = Row, ColEnd = Col;
                try {
                  if (nodesLayout[Row - 1][Col] === OtherEnd) {
                      RowEnd = Row-1;
                  }
                } catch (err) {
                  // console.error("Out of bounds");
                }

                try {
                  if (nodesLayout[Row + 1][Col] === OtherEnd) {
                      RowEnd = Row+1;
                  }
                } catch (err) {
                  // console.error("Out of bounds");
                }

                try {
                  if (nodesLayout[Row][Col - 1] === OtherEnd) {
                      ColEnd = Col-1;
                  }
                } catch (err) {
                  // console.error("Out of bounds");
                }

                try {
                  if (nodesLayout[Row][Col + 1] === OtherEnd) {
                      ColEnd = Col+1;
                  }
                } catch (err) {
                  // console.error("Out of bounds");
                }
                DrawLine(buffer, Col, Row, ColEnd, RowEnd);
              }
            }
          }
        }
      }

      function DrawLine(buffer, TileStartX, TileStartY, TileEndX, TileEndY) {
        let LineIsHorizontal = TileStartX != TileEndX;

        // If line is horizontal
        let MinX = Math.floor((TileSideX * 0.5 * (TileStartX + TileEndX)) + 20);
        let MinY = Math.floor((TileSideY * 0.5 * (TileStartY + TileEndY)) + 20);
        let MaxX = Math.floor((MinX + TileSideX) - 40);
        let MaxY = Math.floor((MinY + TileSideY) - 40);
        
        if (LineIsHorizontal) {
          MinY = Math.floor((TileStartY + 0.5) * TileSideY - 10);
          MaxY = Math.floor((TileStartY + 0.5) * TileSideY + 10);
        } else {                                             
          MinX = Math.floor((TileStartX + 0.5) * TileSideX - 10);
          MaxX = Math.floor((TileStartX + 0.5) * TileSideX + 10);
        }

        for (let Row = MinY; Row <= MaxY; Row++) {
          for (let Col = MinX; Col <= MaxX; Col ++) {
            const pixelIndex = Row * canvas.width + Col;
            if (LineIsHorizontal) {
              if ((Row < MinY + 0.1 * (MaxY - MinY)) || (Row > MinY + 0.9 * (MaxY - MinY))) {
                buffer[pixelIndex] = 0xff00ff00;
              } else {
                buffer[pixelIndex] = 0xff000000;
              }
            } else {
              if ((Col < MinX + 0.1 * (MaxX - MinX)) || (Col > MinX + 0.9 * (MaxX - MinX))) {
                buffer[pixelIndex] = 0xff00ff00;
              } else {
                buffer[pixelIndex] = 0xff000000;
              }
            }
          }
        }       
      }

      function DrawTile(buffer, TileX, TileY, Color) {
        const padding = 1;
        const MinX = Math.floor((TileSideX * TileX) + padding);
        const MinY = Math.floor((TileSideY * TileY) + padding);
        const MaxX = Math.floor((MinX + TileSideX) - (2 * padding));
        const MaxY = Math.floor((MinY + TileSideY) - (2 * padding));

        for (let Row = MinY; Row <= MaxY; Row++) {
          for (let Col = MinX; Col <= MaxX; Col ++) {
            const pixelIndex = Row * canvas.width + Col;
            buffer[pixelIndex] = Color;
          }
        }
      }
    </script>
  </body>
</html>
